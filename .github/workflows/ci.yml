name: CI

on:
  pull_request:
    branches: [main]
  # Also run on push to main so we catch post-merge regressions
  push:
    branches: [main]

jobs:
  check:
    name: check
    # Windows runner so Playwright visual goldens render with the same fonts
    # (Noto Sans Devanagari, Tiro Devanagari Hindi) as the target deployment
    # platform. Linux runners produced 1-2% page-height drift that tripped
    # toHaveScreenshot at a 0% pixel-diff threshold.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      - name: Full gate (tsc, validate-packs, flashcards sync, credit-audit, smoke, visual)
        run: npm run check
        shell: bash
        env:
          # Supabase client requires these even under E2E_AUTH_BYPASS — the
          # createBrowserClient constructor throws on missing URL / key, and
          # the bypass only short-circuits middleware behavior. Both keys
          # are designed to ship in the browser bundle (RLS is the real
          # security boundary), but we store them as repo secrets to keep
          # the workflow file environment-agnostic.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
