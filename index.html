
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankalp Hindi · FCPS Credit Prep</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#ea580c">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sankalp">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700;900&family=Tiro+Devanagari+Hindi&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hindi-line-height: 2.1;
            --hindi-display-line-height: 1.5;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .font-hindi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            line-height: var(--hindi-line-height);
        }
        .font-hindi-display {
            font-family: 'Tiro Devanagari Hindi', 'Noto Sans Devanagari', sans-serif;
            line-height: var(--hindi-display-line-height);
            font-feature-settings: 'kern' 1, 'liga' 1;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* ------------------------------------------------------------------
           Accessibility: keyboard focus
           Default focus-visible ring for ALL interactive elements. Components
           that need a custom focus style (e.g. sidebar nav, card-as-button)
           override via Tailwind utilities; this global rule is the safety net
           for anything we forgot. Color is saffron-500 to match the brand.
           ------------------------------------------------------------------ */
        :focus-visible {
            outline: 2px solid #f97316;
            outline-offset: 2px;
            border-radius: 4px;
        }
        /* Suppress the global ring on elements that already declare their own
           focus-visible style via Tailwind (focus-visible:ring-*). */
        .focus-visible\:ring-2:focus-visible {
            outline: none;
        }

        /* ------------------------------------------------------------------
           Reduced motion: respect the OS preference everywhere.
           Components like Celebration scope their own keyframes and already
           react to prefers-reduced-motion. This rule covers the Tailwind
           utility classes (`animate-in`, `animate-pulse`, `transition-*`)
           that are sprinkled across the app's hover/enter animations.
           ------------------------------------------------------------------ */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ------------------------------------------------------------------
           Print layout
           ------------------------------------------------------------------ */
        @media print {
            @page {
                size: letter portrait;
                margin: 0.5in;
            }
            @page :first {
                margin-top: 0.3in;
            }

            /* Flashcard 8-up sheets need a tighter, predictable margin so the
               2×4 grid of 3.5in × 2.5in cards fits on letter without clipping.
               Scoped to the flashcard print root so pack/capstone print is
               untouched. */
            .flashcard-print-root {
                page: flashcard;
            }
            @page flashcard {
                size: letter portrait;
                margin: 0.4in;
            }

            html, body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                color-adjust: exact;
            }

            .no-print { display: none !important; }

            .printable-area {
                margin: 0 !important;
                width: 100% !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
            }

            /* Tighten card padding for paper */
            .printable-area .rounded-\[2\.5rem\],
            .printable-area .rounded-\[2rem\],
            .printable-area .rounded-\[3rem\],
            .printable-area .rounded-\[1\.75rem\] {
                border-radius: 0.75rem !important;
            }

            /* Devanagari stays readable but tighter than on screen */
            .font-hindi { font-size: 1.05rem !important; }
            .font-hindi-display { font-size: 2rem !important; }

            /* Flashcard print cards set their own explicit font sizes in pt.
               Don't let the global Devanagari size override them — cards are
               fixed 3.5in × 2.5in and content must fit. */
            .flashcard-print-root .font-hindi { font-size: inherit !important; }
            .flashcard-print-root .font-hindi-display { font-size: inherit !important; }

            /* Every card cell must stay on a single page. */
            .flashcard-print-root .print-card {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }

            /* Section-level break control */
            .print\:break-before-page { break-before: page; page-break-before: always; }
            .print\:break-after-page { break-after: page; page-break-after: always; }
            .print\:break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .print\:break-inside-avoid-page { break-inside: avoid-page; page-break-inside: avoid; }

            /* Keep headings with their content */
            h1, h2, h3, h4 {
                break-after: avoid;
                page-break-after: avoid;
                orphans: 3;
                widows: 3;
            }

            p, li { orphans: 2; widows: 2; }

            /* Links in color survive; image colors preserved */
            img { print-color-adjust: exact; }

            /* Hide the sidebar + mobile nav + aside */
            aside, nav { display: none !important; }
            main { overflow: visible !important; padding: 0 !important; }

            /* Table borders visible in print */
            table { border-collapse: collapse !important; }
            table, th, td { border-color: #cbd5e1 !important; }
        }
    </style>
