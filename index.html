
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankalpa Hindi - Teacher's Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --hindi-line-height: 2.2;
        }
        @media print {
            @page {
                size: letter portrait;
                margin: 0.4in;
            }
            .no-print { display: none !important; }
            body { 
                background: white !important; 
                padding: 0 !important; 
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .printable-area { margin: 0 !important; width: 100% !important; border: none !important; box-shadow: none !important; }
            .bg-orange-600 { background-color: #ea580c !important; color: white !important; }
            .bg-blue-50 { background-color: #eff6ff !important; }
            .bg-slate-50 { background-color: #f8fafc !important; }
            .font-hindi { font-size: 1.25rem !important; line-height: var(--hindi-line-height) !important; }
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-hindi { 
            font-family: 'Noto Sans Devanagari', sans-serif; 
            line-height: var(--hindi-line-height);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
